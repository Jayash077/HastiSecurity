<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ⚡ Theme loader (Faster + safer) -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("hasti-theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;

          if (theme === "dark" || (!theme && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 Primary SEO -->
    <title>Hasti Security Solutions | CCTV, Solar & Security Systems Indore</title>
    <meta
      name="description"
      content="CCTV surveillance, solar energy, electronic security, and industrial automation across India since 2008. Best security system dealers in Indore."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Hasti Security Solutions" />
    <meta name="theme-color" content="#ea580c" />

    <!-- 🔗 Canonical -->
    <link rel="canonical" href="https://hasticomputers.com/" />

    <!-- 🌍 Open Graph (Facebook / WhatsApp) -->
    <meta property="og:site_name" content="Hasti Security Solutions" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta
      property="og:title"
      content="Hasti Security Solutions | CCTV, Solar & Security Systems Indore"
    />
    <meta
      property="og:description"
      content="CCTV surveillance, solar energy, electronic security, and industrial automation across India since 2008."
    />

    <!-- 🐦 Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ⚡ Performance: DNS + font optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ⚡ Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>

    <!-- 🚀 React App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
